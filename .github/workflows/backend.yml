name: Backend CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend / LLVM codegen
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            flex \
            bison \
            clang \
            python3-venv \
            python3-pip

      - name: Create virtual environment and install Conan
        run: |
          python3 -m venv .venv
          source .venv/bin/activate
          pip install conan

      - name: Detect Conan profile
        run: |
          source .venv/bin/activate
          conan profile detect --force

      - name: Install dependencies
        run: |
          source .venv/bin/activate
          conan install . --output-folder=third_party --build=missing

      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=./third_party/conan_toolchain.cmake

      - name: Build project
        run: |
          cmake --build build --parallel

      - name: Run backend gtests
        working-directory: build
        run: |
          ./unit_tests/unit_tests --gtest_filter=codegen.*

      - name: Generate LLVM IR
        run: |
          ./build/paracl_codegen unit_tests/data/common/func_basic.dat > out.ll 2> out.err
          test -s out.ll
          test ! -s out.err

      - name: Build generated program
        run: |
          clang++ out.ll ./paralib/paraio.cpp -lstdc++ -o out

      - name: Run generated program
        run: |
          ./out > program.out
          diff -u <(printf "42\n") program.out